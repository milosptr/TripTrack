name: EAS preview build (iOS)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      message:
        description: Optional build message shown in the EAS dashboard
        required: false

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

  build-preview:
    name: EAS preview build (iOS)
    needs: verify
    runs-on: ubuntu-latest
    # Skip when EXPO_TOKEN is not configured (e.g. on forks) so the workflow
    # doesn't fail loudly for contributors who can't trigger EAS builds.
    if: ${{ vars.EAS_PREVIEW_ENABLED != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Trigger EAS preview build
        env:
          # `--no-wait` returns once the build is queued so we don't burn ~20min
          # of Actions time per build. Track progress in the EAS dashboard.
          BUILD_MESSAGE: ${{ inputs.message || format('main @ {0}', github.sha) }}
        run: |
          eas build \
            --profile preview \
            --platform ios \
            --non-interactive \
            --no-wait \
            --message "$BUILD_MESSAGE"
